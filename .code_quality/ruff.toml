line-length = 100
indent-width = 4
target-version = "py310"

exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "__pycache__",
    "build",
    "dist",
]

[lint]
select = ["B", "C90", "E", "F", "I", "PL", "RUF", "S", "SIM", "UP", "W"]
ignore = [
    "E501",
    "S101",
    "PLR0912",
    "PLR0915",
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

